name: Build and Test
on:
    push:
        branches:
            - main
jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
              name: Check out code

            - uses: mr-smithers-excellent/docker-build-push@v6
              name: Build & push Docker image
              with:
                directory: components/web
                image: maskteer/devops-training
                tags: latest
                registry: docker.io
                dockerfile: components/web/Dockerfile
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}