  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # needs: [test-api]
    defaults:
      run:
        working-directory: components/api
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: cache deps
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: components/api/package-lock.json
      - name: install deps
        run: npm ci
      - name: build api
        run: npm run build
      - name: upload useful build outputs
        uses: actions/upload-artifact@v4
        with:
          name: api build outputs
          path: components/api/dist/
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: components/api
          file: components/api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ github.sha }}